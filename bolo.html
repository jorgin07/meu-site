<body>

<h1>🍫 Bolo de Chocolate</h1>

<h2>Ingredientes:</h2>

<ul>
<li>2 ovos</li>
<li>2 xícaras de farinha</li>
<li>1 xícara de chocolate</li>
<li>1 copo de leite</li>
</ul>

<h2>Modo de preparo:</h2>

<p>
Misture tudo, coloque no forno por 40 minutos e pronto.
</p>
